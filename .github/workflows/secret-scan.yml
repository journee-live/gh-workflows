name: Secret Scan

on:
  workflow_call:

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@v3.95.8
        with:
          # Pin the scan range to the PR's base/head. Without these, the action
          # auto-detects the range on pull_request and intermittently resolves
          # base == head, failing with "BASE and HEAD commits are the same".
          # (Empty when not a pull_request event, so push scans still work.)
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified --results=verified,unknown
